<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      const repoBase = '/React2SummativeLab';
      const target = window.location.pathname.replace(/\/+$/, '');
      const redirectPath = target === repoBase ? `${repoBase}/` : `${repoBase}/?redirect=${encodeURIComponent(window.location.pathname + window.location.search + window.location.hash)}`;
      window.location.replace(redirectPath);
    </script>
  </head>
  <body></body>
</html>
